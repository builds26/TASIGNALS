name: Signal Bot

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: signal-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run signal bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signals_bot.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain open_signals.json signal_history.json bot_meta.json)" ]; then
            git add open_signals.json signal_history.json bot_meta.json
            git commit -m "Update signal state [skip ci]"
            git pull --rebase origin main || true
            git push || echo "Push failed, will retry next cycle"
          fi
